<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ScrollSensay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #f8fafc;
    }
    header {
      background: #1d4ed8;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 14px; font-weight: 600; }
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle-label { font-size: 12px; opacity: 0.85; }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #22c55e; }
    input:checked + .slider::before { transform: translateX(16px); }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 16px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #475569;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>ScrollSensay</h1>
    <div class="toggle-wrap">
      <span class="toggle-label">Active</span>
      <label class="toggle">
        <input type="checkbox" id="enabledToggle" />
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <div class="legend">
    <div class="legend-item">
      <div class="dot" style="background:#22c55e"></div> No concerns found
    </div>
    <div class="legend-item">
      <div class="dot" style="background:#f59e0b"></div> Worth a second look
    </div>
    <div class="legend-item">
      <div class="dot" style="background:#ef4444"></div> Some concerns here
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
