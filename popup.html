<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HuddleHive Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #f8fafc;
    }
    header {
      background: #1d4ed8;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 14px; font-weight: 600; }
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle-label { font-size: 12px; opacity: 0.85; }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #22c55e; }
    input:checked + .slider::before { transform: translateX(16px); }

    main { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 12px;
      background: white;
      color: #1e293b;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #1d4ed8; }

    .hint {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
    }

    button {
      width: 100%;
      padding: 9px;
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1e40af; }

    .status {
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      color: #22c55e;
      font-weight: 500;
    }

    .legend {
      display: flex;
      gap: 8px;
      justify-content: center;
      padding: 10px 16px;
      background: #f1f5f9;
      border-top: 1px solid #e2e8f0;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #475569;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <header>
    <h1>HuddleHive Detector</h1>
    <div class="toggle-wrap">
      <span class="toggle-label">Active</span>
      <label class="toggle">
        <input type="checkbox" id="enabledToggle" />
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <main>
    <div class="field">
      <label>API Endpoint</label>
      <input type="url" id="apiEndpoint" placeholder="https://your-api.com/check" />
      <div class="hint">POST endpoint — receives { text } → returns { score: 0–1 }</div>
    </div>
    <div class="field">
      <label>API Key <span style="font-weight:400;text-transform:none;">(optional)</span></label>
      <input type="password" id="apiKey" placeholder="Bearer token or key" />
    </div>
    <button id="save">Save Settings</button>
    <div class="status" id="status"></div>
  </main>

  <div class="legend">
    <div class="legend-item">
      <div class="dot" style="background:#22c55e"></div> Low risk
    </div>
    <div class="legend-item">
      <div class="dot" style="background:#f59e0b"></div> Uncertain
    </div>
    <div class="legend-item">
      <div class="dot" style="background:#ef4444"></div> Misinformation
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
